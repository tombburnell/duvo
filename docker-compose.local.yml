services:
  web:
    image: node:22-alpine
    working_dir: /app
    env_file:
      - .env
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"

volumes:
  web_node_modules:
